<!DOCTYPE html>

                        "outline": "#747782",

                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",

                    "spacing": {

                    "fontFamily": {

                        "body-lg": ["Hanken Grotesk", "sans-serif"],

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

<body class="bg-surface-container-low font-body-md text-on-surface antialiased min-h-screen flex flex-col overflow-x-hidden">
<!-- Minimal Header for Focused View (Back-to-Main Exception) -->
<header class="w-full px-margin-mobile md:px-margin-desktop py-md flex items-center">
<a aria-label="Go back" class="inline-flex items-center justify-center p-sm rounded-full hover:bg-surface-variant transition-colors text-primary-container" href="#">
<span class="material-symbols-outlined">arrow_back</span>
</a>
</header>
<!-- Main Content Area -->
<main class="flex-grow flex items-start justify-center px-margin-mobile md:px-margin-desktop pb-xl">
<!-- Wizard Card (Level 1 Surface) -->
<div class="bg-surface-container-lowest shadow-level-1 rounded-xl w-full max-w-[800px] p-md md:p-lg flex flex-col gap-lg relative overflow-hidden">
<!-- Subtle Geometric Pattern Overlay (Level 0.5) -->
<div class="absolute inset-0 opacity-5 pointer-events-none" style="background-image: radial-gradient(circle at 2px 2px, #0e3b83 1px, transparent 0); background-size: 24px 24px;"></div>
<div class="relative z-10 flex flex-col gap-lg">
<!-- Header Section -->
<div class="flex flex-col gap-sm">
<h1 class="text-headline-lg text-on-surface">Basic Identity</h1>
<p class="text-body-lg text-on-surface-variant">Let's get to know you better. Please provide your basic information.</p>
</div>
<!-- Progress Bar -->
<div class="flex flex-col gap-sm">
<div class="flex justify-between items-end">
<p class="text-emphasis text-on-surface">Step 2 of 4</p>
<p class="text-label-sm text-on-surface-variant">50%</p>
</div>
<div class="h-2 w-full bg-surface-variant rounded-full overflow-hidden">
<div class="h-full bg-primary-container rounded-full" style="width: 50%;"></div>
</div>
</div>
<!-- Profile Photo Upload -->
<div class="flex flex-col items-center justify-center py-md gap-md @container">
<div class="relative group cursor-pointer">
<div class="w-32 h-32 rounded-full bg-surface-container-high border-2 border-dashed border-outline-variant flex items-center justify-center overflow-hidden transition-colors group-hover:border-primary-container">
<!-- Placeholder Image / Icon -->
<div class="absolute inset-0 bg-cover bg-center bg-no-repeat" data-alt="A clean, minimalist placeholder graphic for a user profile photo. The image features a solid, light grey background with a subtle, darker grey geometric avatar silhouette in the center. The aesthetic is modern, professional, and consistent with a corporate light-mode UI design, illuminated by soft, flat lighting without harsh shadows." style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuDMDCI56cVn_lwObkIr4kLYRic5G5wcOk0vdAZ30mKKi6dQuYBrfG99NoSqSwKq7IJnL6kqe0C1Met_mmKxSL6OREV9c0CUxTMAdmKz8glENftUVHOvrArKR0wFixxiWTnv2guK4i5FOS1P8DaTmjLFvFvrS4mfwYN2mWytyOOxVWxwzbZiy9hBF48OY-YWgsJcyOnRSNzAykplKe_qYFfMqqARV3U9KAeJu0FQBP5b9YWVyRFpfj1X-R_5hMcdKrNKjs_m4ckrcRxc");'></div>
<div class="absolute inset-0 bg-black/20 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-on-primary text-[32px]" data-icon="photo_camera">photo_camera</span>
</div>
</div>
</div>
<div class="text-center flex flex-col gap-xs">
<h2 class="text-headline-md text-on-surface">Upload Profile Photo</h2>
<p class="text-body-md text-on-surface-variant">Choose a clear photo of yourself</p>
</div>
<button class="mt-sm px-gutter py-sm rounded-lg bg-surface-variant text-on-surface text-emphasis hover:bg-surface-dim transition-colors flex items-center gap-xs" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="upload">upload</span>
                        Upload Photo
                    </button>
</div>
<!-- Form Fields -->
<form class="flex flex-col gap-md">
<!-- Full Name -->
<div class="flex flex-col gap-xs">
<label class="text-emphasis text-on-surface" for="fullName">Full Name</label>
<input class="w-full bg-surface border border-outline-variant text-on-surface rounded-lg px-md py-sm focus:ring-0 focus:border-primary-container focus:outline-none transition-colors placeholder:text-outline h-[52px]" id="fullName" placeholder="Enter your full name" type="text"/>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<!-- Country of Residence -->
<div class="flex flex-col gap-xs">
<label class="text-emphasis text-on-surface" for="country">Country of Residence</label>
<select class="w-full bg-surface border border-outline-variant text-on-surface rounded-lg px-md py-sm focus:ring-0 focus:border-primary-container focus:outline-none transition-colors h-[52px] appearance-none" id="country" style="background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%23747782%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E'); background-repeat: no-repeat; background-position: right 16px center; background-size: 20px;">
<option disabled="" selected="" value="">Select your country</option>
<option value="ng">Nigeria</option>
<option value="ke">Kenya</option>
<option value="za">South Africa</option>
<option value="gh">Ghana</option>
</select>
</div>
<!-- Nationality -->
<div class="flex flex-col gap-xs">
<label class="text-emphasis text-on-surface" for="nationality">Nationality</label>
<select class="w-full bg-surface border border-outline-variant text-on-surface rounded-lg px-md py-sm focus:ring-0 focus:border-primary-container focus:outline-none transition-colors h-[52px] appearance-none" id="nationality" style="background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%23747782%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E'); background-repeat: no-repeat; background-position: right 16px center; background-size: 20px;">
<option disabled="" selected="" value="">Select your nationality</option>
<option value="ng">Nigerian</option>
<option value="ke">Kenyan</option>
<option value="za">South African</option>
<option value="gh">Ghanaian</option>
</select>
</div>
</div>
<!-- Action Buttons -->
<div class="flex flex-col-reverse sm:flex-row justify-between items-center gap-md pt-md mt-sm border-t border-surface-variant">
<button class="w-full sm:w-auto px-lg py-sm rounded-lg text-primary-container text-emphasis hover:bg-surface-variant transition-colors bg-transparent border-0" type="button">
                            Save for later
                        </button>
<button class="w-full sm:w-auto px-lg py-sm rounded-lg bg-secondary-container text-on-primary text-emphasis font-bold hover:opacity-90 transition-opacity shadow-sm" type="submit">
                            Continue
                        </button>
</div>
</form>
</div>
</div>
</main>
</body></html>
