<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Onboarding - Account Setup</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                    "spacing": {

                        "xl": "80px",
                        "gutter": "24px",
                        "xs": "4px",

                        "margin-desktop": "64px"
                    },
                    "fontFamily": {
                        "display-lg": ["Hanken Grotesk", "sans-serif"],
                        "body-lg": ["Hanken Grotesk", "sans-serif"],

<style>
        body { font-family: 'Hanken Grotesk', sans-serif; }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md overflow-x-hidden relative">
<!-- Minimal Header for Focused View (Back-to-Main Exception) -->
<header class="w-full max-w-[1280px] mx-auto px-margin-desktop py-md flex items-center justify-between shrink-0">
<button class="flex items-center gap-2 text-on-surface-variant hover:text-primary transition-colors focus:outline-none">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
<span class="font-emphasis">Back</span>
</button>
<div class="font-headline-md text-primary tracking-tight">MIF<span class="text-secondary-container">NGN</span></div>
<div class="w-[72px]"></div> <!-- Spacer for perfect centering -->
</header>
<!-- Main Wizard Content -->
<main class="flex-1 flex flex-col items-center justify-center p-4">
<!-- Level 1 Surface Card with Ambient Shadow -->
<div class="w-full max-w-[640px] bg-surface-container-lowest rounded-xl shadow-[0px_4px_20px_rgba(0,0,0,0.05)] p-xl relative overflow-hidden">
<!-- Level 0.5 Overlay Pattern (Afro geometric vibe) -->
<div class="absolute inset-0 opacity-[0.03] pointer-events-none" style="background-image: radial-gradient(circle at 2px 2px, #0e3b83 1px, transparent 0); background-size: 24px 24px;"></div>
<!-- Progress Steps Indicator -->
<div class="flex items-center justify-between mb-xl relative z-10">
<!-- Step 1: Active -->
<div class="flex items-center gap-base flex-1">
<div class="w-8 h-8 rounded-full bg-primary-container text-on-primary flex items-center justify-center font-emphasis text-sm shrink-0 shadow-sm">1</div>
<span class="font-emphasis text-primary whitespace-nowrap">Account Setup</span>
</div>
<!-- Connector Line Active -->
<div class="h-1 bg-surface-variant flex-1 mx-4 rounded-full overflow-hidden">
<div class="h-full bg-primary-container w-1/2 rounded-full"></div>
</div>
<!-- Step 2: Pending -->
<div class="flex items-center gap-base flex-1 justify-center opacity-50">
<div class="w-8 h-8 rounded-full bg-surface-variant text-on-surface-variant border border-outline-variant flex items-center justify-center font-emphasis text-sm shrink-0">2</div>
<span class="font-emphasis text-on-surface-variant whitespace-nowrap">Profile</span>
</div>
<!-- Connector Line Pending -->
<div class="h-1 bg-surface-variant flex-1 mx-4 rounded-full"></div>
<!-- Step 3: Pending -->
<div class="flex items-center gap-base flex-1 justify-end opacity-50">
<div class="w-8 h-8 rounded-full bg-surface-variant text-on-surface-variant border border-outline-variant flex items-center justify-center font-emphasis text-sm shrink-0">3</div>
<span class="font-emphasis text-on-surface-variant whitespace-nowrap">Verify</span>
</div>
</div>
<!-- Header Content -->
<div class="mb-lg relative z-10 text-center">
<h1 class="font-headline-lg text-on-background mb-base">Set up your account</h1>
<p class="font-body-lg text-on-surface-variant">Let's get started by creating your login credentials to join the next generation network.</p>
</div>
<!-- Form Area -->
<form class="flex flex-col gap-md relative z-10 max-w-[480px] mx-auto">
<!-- Email Input -->
<div class="flex flex-col gap-base">
<label class="font-emphasis text-on-surface">Email Address</label>
<input class="w-full h-14 px-4 bg-surface rounded-lg border border-outline-variant focus:border-primary-container focus:ring-1 focus:ring-primary-container focus:outline-none font-body-md text-on-background transition-colors placeholder:text-outline" type="email" value="leader@mif-ngn.org"/>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-base">
<label class="font-emphasis text-on-surface">Password</label>
<div class="relative">
<input class="w-full h-14 px-4 pr-12 bg-surface rounded-lg border border-outline-variant focus:border-primary-container focus:ring-1 focus:ring-primary-container focus:outline-none font-body-md text-on-background transition-colors" type="password" value="AfroFuture2025!"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined" data-icon="visibility_off">visibility_off</span>
</button>
</div>
</div>
<!-- Password Strength Indicator -->
<div class="flex flex-col gap-xs mt-1">
<div class="flex gap-2 h-1.5 w-full">
<div class="flex-1 bg-secondary-container rounded-full"></div>
<div class="flex-1 bg-secondary-container rounded-full"></div>
<div class="flex-1 bg-secondary-container rounded-full"></div>
<div class="flex-1 bg-surface-variant rounded-full"></div>
</div>
<p class="font-label-sm text-secondary-container text-right mt-1">Strong password</p>
</div>
<!-- Actions -->
<div class="mt-lg pt-md flex justify-end">
<!-- Level 2 Interactive FAB/Button -->
<button class="bg-secondary-container text-on-secondary font-emphasis py-3 px-8 rounded-lg hover:bg-secondary transition-colors shadow-[0px_8px_30px_rgba(0,0,0,0.10)] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-secondary-container flex items-center gap-2" type="button">
<span>Continue</span>
<span class="material-symbols-outlined text-sm" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
</div>
</main>
</body></html>
