<style>
        body { font-family: 'Hanken Grotesk', sans-serif; }
    </style>

<body class="bg-background text-on-background min-h-screen flex antialiased">
<!-- Minimal Header for Back Navigation (Mobile primarily, but sits above form) -->
<div class="absolute top-0 left-0 w-full p-margin-mobile md:p-md flex justify-between items-center z-10 pointer-events-none">
<button class="pointer-events-auto flex items-center gap-2 text-primary hover:text-primary-container transition-colors duration-200">
<span class="material-symbols-outlined text-[20px]">arrow_back</span>
<span class="font-emphasis text-sm">Back</span>
</button>
</div>
<main class="w-full grid grid-cols-1 md:grid-cols-2 min-h-screen">
<!-- Left Panel: Decorative Pattern -->
<div class="hidden md:block relative bg-primary-container overflow-hidden">
<!-- Background Image with Pattern -->
<div class="absolute inset-0 bg-cover bg-center opacity-40 mix-blend-overlay" data-alt="A modern, abstract digital background featuring intricate geometric patterns inspired by African textiles. The overarching style is corporate yet culturally vibrant, utilizing a sophisticated palette of deep institutional blue with energetic accents of bright orange and subtle lime green. The lighting is soft and diffused, creating a professional, light-mode aesthetic suitable for a prestigious leadership portal." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBcchwYPy0jgMks94CDxJtja0xrvZSJ57CAjhrStHZTqx4CiVeJDWDmDMhYzOS9ymj_XLbHbzU2e1g6IQGKe4Wel74wwSRr7Y6icYLgxifPHF8Z4VfL-v-YqUIuh2WfnKA5yrzsicxt1SgiGFHhAKs3LWkPaR7IJkPf0TQjxlFkfYblFTf1NuZMJmYoWcfWvGnLkp1ObuJV0SHzLMZ9dPuHaMRkc7GG7Sh525EVl4-Yhx8u0_WW3uXd6wIBPm8_X_y2KjSZmoOs03z0');">
</div>
<!-- Branding Overlay -->
<div class="relative z-10 h-full flex flex-col justify-end p-margin-desktop pb-xl">
<div class="size-12 text-secondary-container mb-md">
<svg fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path d="M42.4379 44C42.4379 44 36.0744 33.9038 41.1692 24C46.8624 12.9336 42.2078 4 42.2078 4L7.01134 4C7.01134 4 11.6577 12.932 5.96912 23.9969C0.876273 33.9029 7.27094 44 7.27094 44L42.4379 44Z" fill="currentColor"></path>
</svg>
</div>
<h2 class="text-on-primary font-display-lg max-w-md">Empowering the next generation of African leaders.</h2>
</div>
</div>
<!-- Right Panel: Login Form -->
<div class="flex flex-col justify-center items-center px-margin-mobile py-xl md:p-margin-desktop bg-surface relative z-0">
<div class="w-full max-w-[420px] flex flex-col">
<!-- Header -->
<div class="mb-lg text-center md:text-left">
<h1 class="font-headline-lg-mobile md:font-headline-lg text-primary mb-xs">Welcome back</h1>
<p class="font-body-md text-on-surface-variant">Please enter your details to sign in to the portal.</p>
</div>
<!-- Form -->
<form class="flex flex-col gap-md">
<!-- Email Field -->
<div class="flex flex-col gap-xs">
<label class="font-emphasis text-on-surface" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline">mail</span>
<input class="w-full h-12 pl-10 pr-sm rounded-lg bg-surface-container-lowest border border-outline-variant text-on-surface font-body-md placeholder:text-outline focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="email" placeholder="Enter your email" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center">
<label class="font-emphasis text-on-surface" for="password">Password</label>
<a class="font-label-sm text-primary hover:text-primary-container transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="w-full h-12 pl-10 pr-10 rounded-lg bg-surface-container-lowest border border-outline-variant text-on-surface font-body-md placeholder:text-outline focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="password" placeholder="Enter your password" type="password"/>
<button class="absolute right-sm top-1/2 -translate-y-1/2 text-outline hover:text-on-surface" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- Actions -->
<div class="flex flex-col gap-sm mt-sm">
<!-- Primary Sign In -->
<button class="w-full h-12 rounded-lg bg-secondary-container text-on-secondary font-emphasis shadow-[0px_4px_20px_rgba(0,0,0,0.05)] hover:bg-secondary transition-colors duration-200" type="submit">
                            Sign In
                        </button>
<!-- Divider -->
<div class="relative flex py-sm items-center">
<div class="flex-grow border-t border-surface-container-high"></div>
<span class="flex-shrink-0 mx-4 text-outline font-label-sm">OR</span>
<div class="flex-grow border-t border-surface-container-high"></div>
</div>
<!-- Magic Link -->
<button class="w-full h-12 rounded-lg bg-transparent border-2 border-primary text-primary font-emphasis flex items-center justify-center gap-2 hover:bg-primary-fixed transition-colors duration-200" type="button">
<span class="material-symbols-outlined text-[20px]">auto_awesome</span>
                            Sign in with Magic Link
                        </button>
</div>
</form>
<!-- Sign Up Prompt -->
<p class="mt-lg text-center font-body-md text-on-surface-variant">
                    Don't have an account? 
                    <a class="font-emphasis text-primary hover:underline underline-offset-4 decoration-2 decoration-secondary-container" href="#">Sign up now</a>
</p>
</div>
</div>
</main>
</body></html>
