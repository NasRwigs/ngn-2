<style>
        body {
            font-family: 'Hanken Grotesk', sans-serif;
        }
        /* Geometric Background Pattern - Subtle Overlay */
        .bg-pattern {
            background-image: radial-gradient(circle at 2px 2px, rgba(14, 59, 131, 0.05) 1px, transparent 0);
            background-size: 24px 24px;
        }
    </style>

    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background min-h-screen flex flex-col items-center justify-center relative overflow-hidden text-on-surface">
<!-- Ambient Geometric Background -->
<div class="absolute inset-0 bg-pattern z-0 pointer-events-none"></div>
<!-- Main Container -->
<main class="w-full max-w-[480px] px-margin-mobile sm:px-gutter py-xl relative z-10 flex flex-col h-full justify-center">
<!-- Back Button (Minimal Navigation for Focused View) -->
<div class="absolute top-margin-mobile left-margin-mobile sm:top-md sm:left-md">
<button aria-label="Go back" class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-lowest shadow-[0px_4px_20px_rgba(0,0,0,0.05)] text-primary-container hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
</div>
<!-- Logo & Header -->
<div class="flex flex-col items-center mb-lg">
<div class="w-24 h-24 mb-md rounded-full bg-surface-container-lowest shadow-[0px_4px_20px_rgba(0,0,0,0.05)] flex items-center justify-center overflow-hidden">
<!-- Using a placeholder image for the logo, with detailed prompt in data-alt -->
<img alt="MIF Logo Placeholder" class="w-full h-full object-cover" data-alt="A clean, minimalist 3D rendering of an abstract corporate logo inside a pristine white circle. The logo design features sharp, precise geometric intersecting shapes in deep institutional blue and vibrant, energetic lime green and orange accents. The lighting is soft, diffused studio lighting against a warm light-grey background, conveying an authoritative, modern, and trustworthy institutional identity." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAlxIMLSPqO3qWjL3NyLmnSDSjYgo17JUcmyBjMFVizxxrpdKnpf3dTmHUtMI-KEPkBf_E_BJY3izUnsbZJJ949pSNWF9TkkOtOjs8AqDuHPp0xdFOevKemqhIkKxrocCFm04lMev7aCbuMoxZtW34GvOuA12Xpl_uBMJaIYdcw46FJS3DV7YODPdyqRHjnHk2ptBIECJq3o_gyRBGBa9Ta3KZbgTGvbGf6tTdEJmve7Aju-2YOg0rg-a74lNoWagqnqDjdSTX5KeF_"/>
</div>
<h1 class="text-headline-lg-mobile sm:text-headline-lg text-on-surface text-center mb-xs">Welcome back</h1>
<p class="text-body-md text-on-surface-variant text-center">Sign in to the NGN Portal</p>
</div>
<!-- Login Form -->
<form class="flex flex-col gap-md w-full bg-surface-container-lowest p-md sm:p-lg rounded-[16px] shadow-[0px_4px_20px_rgba(0,0,0,0.05)]">
<!-- Email Input -->
<div class="flex flex-col gap-base">
<label class="text-emphasis text-on-surface" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline" data-icon="mail">mail</span>
</div>
<input class="w-full pl-[44px] pr-sm py-sm bg-surface-container-low border border-outline-variant rounded-lg text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all" id="email" name="email" placeholder="Enter your email" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-base">
<div class="flex justify-between items-center">
<label class="text-emphasis text-on-surface" for="password">Password</label>
<a class="text-label-sm text-primary-container hover:text-primary transition-colors underline decoration-primary-container/30 underline-offset-4" href="#">Forgot Password?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline" data-icon="lock">lock</span>
</div>
<input class="w-full pl-[44px] pr-sm py-sm bg-surface-container-low border border-outline-variant rounded-lg text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all" id="password" name="password" placeholder="Enter your password" type="password"/>
<button aria-label="Toggle password visibility" class="absolute inset-y-0 right-0 pr-sm flex items-center text-outline hover:text-on-surface-variant transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Actions -->
<div class="flex flex-col gap-sm mt-sm">
<!-- Primary CTA -->
<button class="w-full py-sm px-md bg-secondary-container text-on-primary rounded-lg font-emphasis shadow-[0px_4px_20px_rgba(0,0,0,0.05)] hover:shadow-[0px_8px_30px_rgba(0,0,0,0.10)] hover:opacity-90 transition-all flex items-center justify-center gap-xs" type="submit">
                    Sign In
                    <span class="material-symbols-outlined text-[20px]" data-icon="arrow_forward">arrow_forward</span>
</button>
<!-- Divider -->
<div class="relative flex items-center py-sm">
<div class="flex-grow border-t border-surface-container-high"></div>
<span class="flex-shrink-0 mx-sm text-label-sm text-outline uppercase tracking-wider">Or</span>
<div class="flex-grow border-t border-surface-container-high"></div>
</div>
<!-- Secondary CTA (Magic Link) -->
<button class="w-full py-sm px-md bg-transparent border-2 border-primary-container text-primary-container rounded-lg font-emphasis hover:bg-primary-fixed hover:border-primary transition-all flex items-center justify-center gap-xs" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="auto_awesome">auto_awesome</span>
                    Sign in with Magic Link
                </button>
</div>
</form>
<!-- Footer Links -->
<div class="mt-lg text-center">
<p class="text-body-md text-on-surface-variant">
                Don't have an account? 
                <a class="text-primary-container font-emphasis hover:underline underline-offset-4" href="#">Request Access</a>
</p>
</div>
</main>
</body></html>
